<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuri's Maze</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== TITLE SCREEN ===== */
  #title-screen {
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #5cc8ff 0%, #87e0ff 40%, #a0e860 60%, #7acc30 80%, #c8a050 90%, #d4a840 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Clouds */
  .cloud { position: absolute; top: 8%; }
  .cloud-sprite {
    width: 80px; height: 40px;
    background: white;
    border-radius: 20px;
    position: relative;
    image-rendering: pixelated;
  }
  .cloud-sprite::before {
    content: '';
    position: absolute;
    width: 44px; height: 44px;
    background: white;
    border-radius: 22px;
    top: -18px; left: 12px;
  }
  .cloud-sprite::after {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    background: white;
    border-radius: 14px;
    top: -10px; left: 38px;
  }
  .cloud-face {
    position: absolute;
    top: 8px;
    display: flex;
    gap: 16px;
    left: 16px;
  }
  .cloud-eye {
    width: 8px; height: 8px;
    background: #555;
    image-rendering: pixelated;
  }
  .cloud1 { left: 5%; animation: cloudFloat 8s ease-in-out infinite; }
  .cloud2 { right: 10%; animation: cloudFloat 10s ease-in-out infinite 2s; }
  @keyframes cloudFloat {
    0%,100% { transform: translateX(0); }
    50% { transform: translateX(20px); }
  }

  /* Ground / Hills */
  .ground-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: #c8a050;
    border-top: 8px solid #8b5c20;
  }
  .hill {
    position: absolute;
    bottom: 52px;
    border-radius: 50% 50% 0 0;
  }
  .hill1 { left: -40px; width: 220px; height: 110px; background: #5ab030; }
  .hill2 { right: 60px; width: 180px; height: 90px; background: #6cc030; }

  /* Pipes */
  .pipe {
    position: absolute;
    bottom: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    image-rendering: pixelated;
  }
  .pipe-top {
    width: 60px; height: 20px;
    background: #2ea030;
    border: 4px solid #1a6020;
    border-radius: 4px 4px 0 0;
  }
  .pipe-body {
    width: 48px;
    background: #38b838;
    border-left: 4px solid #1a6020;
    border-right: 4px solid #1a6020;
  }
  .pipe1 { left: 12%; }
  .pipe1 .pipe-body { height: 80px; }
  .pipe2 { right: 28%; }
  .pipe2 .pipe-body { height: 60px; }

  /* Mushroom House */
  .mushroom-house {
    position: absolute;
    bottom: 52px;
    right: 4%;
    width: 100px;
  }
  .mush-cap {
    width: 110px; height: 70px;
    background: #e83030;
    border-radius: 55px 55px 0 0;
    margin-left: -5px;
    position: relative;
    border: 4px solid #a01010;
  }
  .mush-cap::before, .mush-cap::after, .mush-dot {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: white;
    border: 3px solid #e0e0e0;
  }
  .mush-cap::before { width: 28px; height: 28px; top: 12px; left: 12px; }
  .mush-cap::after { width: 20px; height: 20px; top: 8px; right: 16px; }
  .mush-dot { width: 16px; height: 16px; bottom: 12px; left: 50%; transform: translateX(-50%); }
  .mush-stem {
    width: 70px; height: 40px;
    background: #f5e0b0;
    border: 4px solid #c0a060;
    margin-left: 15px;
    position: relative;
  }
  .mush-door {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 24px; height: 28px;
    background: #8b5c20;
    border: 3px solid #5c3010;
    border-radius: 12px 12px 0 0;
  }

  /* Cactus / Tall Pipe thing */
  .tall-green {
    position: absolute;
    right: 18%;
    bottom: 52px;
    width: 50px;
    background: #38b838;
    border: 4px solid #1a6020;
    border-radius: 25px 25px 0 0;
  }

  /* Brick */
  .brick-block {
    position: absolute;
    width: 48px; height: 48px;
    background: #c87830;
    border: 4px solid #8b4820;
    image-rendering: pixelated;
    top: 38%; left: 6%;
  }
  .brick-block::before {
    content: '';
    position: absolute;
    width: 100%; height: 4px;
    background: #8b4820;
    top: 50%; transform: translateY(-50%);
  }
  .brick-block::after {
    content: '';
    position: absolute;
    height: 100%; width: 4px;
    background: #8b4820;
    left: 50%; transform: translateX(-50%);
  }

  /* Star */
  .star-char {
    position: absolute;
    left: 8%; top: 42%;
    font-size: 42px;
    animation: starBob 1.2s ease-in-out infinite;
    filter: drop-shadow(0 0 8px #ffd000);
  }
  @keyframes starBob {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }

  /* Yuri Character Photo */
  .yuri-character {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    animation: yuriEntrance 0.9s cubic-bezier(0.34,1.56,0.64,1) both 0.5s, yuriIdle 2s ease-in-out infinite 1.4s;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6)) drop-shadow(0 0 30px rgba(255,208,0,0.4));
  }
  .yuri-character img {
    width: clamp(90px, 14vw, 150px);
    height: clamp(110px, 17vw, 180px);
    object-fit: cover;
    object-position: top center;
    border-radius: 50% 50% 40% 40%;
    border: 5px solid #ffd000;
    box-shadow: 0 0 0 4px #1a1060, 0 0 25px rgba(255,208,0,0.7);
    display: block;
  }
  .yuri-badge {
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff3020;
    color: white;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 3px 8px;
    border: 2px solid #1a1060;
    white-space: nowrap;
    box-shadow: 2px 2px 0 #1a1060;
  }
  .orbit-star {
    position: absolute;
    font-size: 18px;
    top: 50%; left: 50%;
    margin: -9px 0 0 -9px;
    animation: orbitStar 3s linear infinite;
  }
  .orbit-star:nth-child(1) { animation-delay: 0s; }
  .orbit-star:nth-child(2) { animation-delay: -1s; }
  .orbit-star:nth-child(3) { animation-delay: -2s; }
  @keyframes orbitStar {
    0%   { transform: rotate(0deg) translateX(70px) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
  }
  .yuri-orbit-wrap {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    z-index: 11;
    pointer-events: none;
  }
  @keyframes yuriEntrance {
    from { transform: translateX(-50%) translateY(100px) scale(0.3); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
  }
  @keyframes yuriIdle {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-10px); }
  }

  /* Title Logo */
  .title-logo {
    position: relative;
    text-align: center;
    z-index: 10;
    margin-bottom: 8px;
    margin-top: -30px;
    animation: logoAppear 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes logoAppear {
    from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .title-yuri {
    font-size: clamp(52px, 9vw, 90px);
    color: #ff3020;
    -webkit-text-stroke: 5px #1a1060;
    text-shadow: 6px 6px 0 #1a1060, -2px -2px 0 #ffd000;
    display: block;
    letter-spacing: 4px;
    line-height: 1.1;
  }
  .title-maze {
    font-size: clamp(60px, 10vw, 100px);
    color: #ffd000;
    -webkit-text-stroke: 5px #1a1060;
    text-shadow: 6px 6px 0 #1a1060, -2px -2px 0 #ff8000;
    display: block;
    letter-spacing: 2px;
    line-height: 1;
  }
  .title-star1 { position: absolute; top: -10px; left: 10px; font-size: 24px; animation: twinkle 1s infinite; }
  .title-star2 { position: absolute; top: -5px; right: 15px; font-size: 18px; animation: twinkle 1.3s infinite 0.4s; }
  .title-star3 { position: absolute; bottom: 20px; left: 40px; font-size: 16px; animation: twinkle 0.9s infinite 0.7s; }
  @keyframes twinkle {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .press-start {
    font-size: clamp(12px, 2vw, 18px);
    color: white;
    -webkit-text-stroke: 1px #1a1060;
    text-shadow: 2px 2px 0 #1a1060;
    animation: blink 1s step-end infinite;
    margin-bottom: 10px;
    z-index: 10;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  .copyright-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #1a1060;
    color: #ffd000;
    text-align: center;
    padding: 10px;
    font-size: clamp(8px, 1.5vw, 12px);
    border-top: 4px solid #ffd000;
    z-index: 10;
  }

  /* Screen border effect */
  .screen-border {
    position: absolute;
    inset: 0;
    border: 12px solid #1a1060;
    border-radius: 12px;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.3);
    pointer-events: none;
    z-index: 20;
  }
  .screen-scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    pointer-events: none;
    z-index: 19;
  }

  /* ===== GAME SCREEN ===== */
  #game-screen {
    display: none;
    flex-direction: column;
    width: 100%;
    height: 100%;
    background: #1a0a2e;
    position: relative;
  }

  #hud {
    background: #1a1060;
    border-bottom: 4px solid #ffd000;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: space-between;
    color: white;
    font-size: clamp(7px, 1.2vw, 11px);
  }
  .hud-item { display: flex; align-items: center; gap: 8px; }
  .hud-label { color: #ffd000; }

  #bomb-bar-wrap {
    width: 80px; height: 10px;
    background: #333;
    border: 2px solid #ffd000;
    border-radius: 5px;
    overflow: hidden;
  }
  #bomb-bar { height: 100%; background: #ff4400; transition: width 0.1s linear; border-radius: 5px; }

  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    max-width: 100%;
    max-height: 100%;
  }

  /* ===== WIN / LOSE OVERLAY ===== */
  #overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 100;
  }
  #overlay.show { display: flex; }
  #overlay-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(24px, 5vw, 48px);
    text-align: center;
  }
  #overlay-msg {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 2vw, 16px);
    color: white;
    text-align: center;
  }
  #overlay-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 1.8vw, 14px);
    background: #ffd000;
    color: #1a1060;
    border: 4px solid #1a1060;
    padding: 14px 28px;
    cursor: pointer;
    margin-top: 10px;
    transition: transform 0.1s;
    box-shadow: 4px 4px 0 #1a1060;
  }
  #overlay-btn:active { transform: translate(4px,4px); box-shadow: none; }

  /* Mobile Controls */
  #mobile-controls {
    display: none;
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    padding: 0 20px;
    justify-content: space-between;
    align-items: center;
    z-index: 50;
    pointer-events: none;
  }
  @media (max-width: 800px) { #mobile-controls { display: flex; } }

  .dpad {
    display: grid;
    grid-template-columns: 44px 44px 44px;
    grid-template-rows: 44px 44px 44px;
    gap: 4px;
    pointer-events: all;
  }
  .dpad-btn {
    background: rgba(255,208,0,0.85);
    border: 3px solid #1a1060;
    border-radius: 6px;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 2px 2px 0 #1a1060;
    font-family: 'Press Start 2P', monospace;
    color: #1a1060;
  }
  .dpad-btn:active { transform: translate(2px,2px); box-shadow: none; }
  .dpad-center { background: rgba(100,100,100,0.5); cursor: default; }
  #bomb-btn {
    pointer-events: all;
    width: 70px; height: 70px;
    background: rgba(255,50,0,0.85);
    border: 3px solid #1a1060;
    border-radius: 50%;
    font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 3px 3px 0 #1a1060;
  }
  #bomb-btn:active { transform: translate(3px,3px); box-shadow: none; }
</style>
</head>

        <span id="phase-val" style="color:#ff8800;">1</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">💣  BOMB:</span>
        <div id="bomb-bar-wrap"><div id="bomb-bar" style="width:100%"></div></div>
        <span id="bomb-ready-txt" style="color:#00ff88;font-size:9px;">READY!</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">🏆  SCORE:</span>
        <span id="score-val">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">💥  BOMBS LEFT:</span>
        <span id="bomb-count-val">1</span>
      </div>
      <div class="hud-item" style="color:#88ff88;font-size:9px;">
        ARROWS=MOVE &nbsp; SPACE=BOMB
      </div>
    </div>

    <div id="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Overlay (win/lose) -->
    <div id="overlay">
      <div id="overlay-title"></div>
      <div id="overlay-msg"></div>
      <button id="overlay-btn" onclick="restartGame()">PLAY AGAIN</button>
    </div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
      <div class="dpad">
        <div></div>
        <div class="dpad-btn" id="btn-up">▲ </div>
        <div></div>
        <div class="dpad-btn" id="btn-left">◀ </div>
        <div class="dpad-center"></div>
        <div class="dpad-btn" id="btn-right">▶ </div>
        <div></div>
        <div class="dpad-btn" id="btn-down">▼ </div>
        <div></div>
      </div>
      <div id="bomb-btn">💣 </div>
    </div>
  </div>

</div>

<script>
// ===== PLAYER SPRITE =====
let yuriSprite = null;
(function() {
  const raw = new Image();
  raw.onload = function() {
    const oc = document.createElement('canvas');
    oc.width = raw.width; oc.height = raw.height;
    const ox = oc.getContext('2d');
    ox.drawImage(raw, 0, 0);
    const id = ox.getImageData(0, 0, oc.width, oc.height);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      if (d[i] > 210 && d[i+1] > 210 && d[i+2] > 210) d[i+3] = 0;
    }
    ox.putImageData(id, 0, 0);
    yuriSprite = oc;
  };
  raw.src = 'yuri-player.png';
})();

// ===== CONSTANTS =====
const TILE = 40;
const COLS = 17;
const ROWS = 13;
const W = COLS * TILE;
const H = ROWS * TILE;

// ===== PHASE THEMES =====
const THEMES = {
  1: {
    bgTop: '#3a88cc', bgBot: '#88cc44',
    wall: '#3a6030', wallHL: '#5a9050', wallDK: '#1a4018',
    path: '#c8e890', pathDot: 'rgba(60,140,20,0.3)',
    softBox: '#d4a020', softBoxDK: '#a07010',
    enemy: '#9030c0', enemyHL: '#cc60ff',
  },
  2: {
    bgTop: '#0a0818', bgBot: '#1a1030',
    wall: '#445566', wallHL: '#7788aa', wallDK: '#1a2233',
    path: '#2a1a0a', pathDot: 'rgba(100,70,30,0.4)',
    softBox: '#7a4a18', softBoxDK: '#4a2a08',
    enemy: '#cc4400', enemyHL: '#ff8844',
  }
};

// Shared colors
const C = {
  player: '#ff3820', playerHat: '#1a1060',
  bomb: '#222', bombHL: '#555',
  fire: '#ff6000', fireHL: '#ffcc00',
  rock: '#887755', rockHL: '#aa9977', rockDK: '#554433',
  gorilla: '#553311', gorillaHL: '#7a4a22',
};

// ===== MAP DEFINITIONS =====
// W=wall B=breakable R=rock(indestructible) .=path S=start E=exit M=enemy G=fast-gorilla
const MAPS = [
  // Phase 1 - Jungle maze
  [
    'WWWWWWWWWWWWWWWWW',
    'WS..B...B...B..EW',
    'W.W.W.WBW.W.W.W.W',
    'W...B.....B...B.W',
    'W.W.W.W.W.W.W.W.W',
    'WB..B..B..B..B..W',
    'W.W.W.W.W.W.W.W.W',
    'W..B....B....B..W',
    'W.W.W.WBW.W.W.W.W',
    'W.B.B.....B.B.B.W',
    'W.W.W.W.W.W.W.W.W',
    'W...B.M.....B...W',
    'WWWWWWWWWWWWWWWWW',
  ],
  // Phase 2 - DK3 Construction Zone: rocks narrow paths, gorillas hunt you
  [
    'WWWWWWWWWWWWWWWWW',
    'WS.RB..MB..B.R.EW',
    'W.W.W.WBW.W.W.W.W',
    'W.R.B.....B.R.B.W',
    'W.W.W.W.W.W.W.W.W',
    'WB.RB.MB..B.RB..W',
    'W.W.W.W.W.W.W.W.W',
    'W.RB..GB...RBR.BW',
    'W.W.W.WBW.W.W.W.W',
    'W.B.R.M...R.B.G.W',
    'W.W.W.W.W.W.W.W.W',
    'WR.B.MB....MB.RGW',
    'WWWWWWWWWWWWWWWWW',
  ]
];

// ===== STATE =====
let map, player, enemies, bombs, explosions, score, gameOver, won;
let bombTimer = 0, bombCooldown = 3000;
let lastTime = 0;
let playerMoveTimer = 0;
const PLAYER_SPEED = 180;
let lives = 3;
let currentPhase = 1;
let scorePopups = [];

// ===== CANVAS SETUP =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const maxW = wrap.clientWidth;
  const maxH = wrap.clientHeight - 80;
  const scale = Math.min(maxW / W, maxH / H);
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}

// ===== INIT =====
function initGame(phase) {
  currentPhase = phase || 1;
  const tmpl = MAPS[currentPhase - 1];
  map = tmpl.map(row => row.split(''));
  player = null; enemies = []; bombs = []; explosions = []; scorePopups = [];
  score = 0; gameOver = false; won = false;
  bombTimer = bombCooldown;
  playerMoveTimer = 0;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = map[r][c];
      if (t === 'S') {
        player = { r, c, alive: true, facing: 1 };
        map[r][c] = '.';
      } else if (t === 'M') {
        enemies.push({ r, c, alive: true, moveTimer: 0, moveSpeed: currentPhase === 2 ? 480 : 700, type: 'goomba' });
        map[r][c] = '.';
      } else if (t === 'G') {
        enemies.push({ r, c, alive: true, moveTimer: 0, moveSpeed: 280, type: 'gorilla' });
        map[r][c] = '.';
      }
    }
  }
  updateHUD();
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('lives-val').textContent = '❤️'.repeat(Math.max(0, lives));
  document.getElementById('phase-val').textContent = currentPhase;
  const pct = Math.min(100, (bombTimer / bombCooldown) * 100);
  document.getElementById('bomb-bar').style.width = pct + '%';
  const hasBomb = bombTimer >= bombCooldown;
  document.getElementById('bomb-bar').style.background = hasBomb ? '#00cc44' : '#ff4400';
  document.getElementById('bomb-ready-txt').textContent = hasBomb ? 'READY!' : Math.ceil((bombCooldown - bombTimer)/1000)+'s';
  document.getElementById('bomb-count-val').textContent = hasBomb ? '1' : '0';
}

// ===== DRAWING =====
function th() { return THEMES[currentPhase] || THEMES[1]; }

function drawBackground() {
  const t = th();
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, t.bgTop);
  grd.addColorStop(1, t.bgBot);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  if (currentPhase === 2) {
    // DK3: steel scaffolding beams in background
    ctx.strokeStyle = 'rgba(80,100,140,0.25)';
    ctx.lineWidth = 8;
    for (let i = 1; i < 4; i++) {
      ctx.beginPath(); ctx.moveTo(0, i*(H/4)); ctx.lineTo(W, i*(H/4)); ctx.stroke();
    }
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(80,100,140,0.12)';
    for (let i = 1; i < 5; i++) {
      ctx.beginPath(); ctx.moveTo(i*(W/5), 0); ctx.lineTo(i*(W/5), H); ctx.stroke();
    }
  } else {
    // Phase 1: puffy clouds
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    [[80,50,22],[105,42,18],[57,45,16],[W-80,60,22],[W-55,52,18],[W-108,58,15]].forEach(([cx,cy,r]) => {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    });
  }
}

function drawWallTile(x, y) {
  const t = th();
  if (currentPhase === 2) {
    // Steel girder with rivets
    ctx.fillStyle = t.wall;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = t.wallHL;
    ctx.fillRect(x, y, TILE, 7);
    ctx.fillRect(x, y+TILE-7, TILE, 7);
    ctx.fillStyle = t.wallDK;
    ctx.fillRect(x+TILE-5, y, 5, TILE);
    ctx.fillRect(x, y+TILE-5, TILE, 5);
    // Rivets
    ctx.fillStyle = t.wallHL;
    [[x+5,y+3],[x+TILE-10,y+3],[x+5,y+TILE-8],[x+TILE-10,y+TILE-8]].forEach(([rx,ry]) => {
      ctx.beginPath(); ctx.arc(rx+2, ry+2, 3, 0, Math.PI*2); ctx.fill();
    });
    ctx.strokeStyle = t.wallDK;
    ctx.lineWidth = 1;
    ctx.strokeRect(x+0.5, y+0.5, TILE-1, TILE-1);
  } else {
    // Green pipe wall
    ctx.fillStyle = t.wall;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = t.wallHL;
    ctx.fillRect(x, y, 6, TILE);
    ctx.fillStyle = t.wallDK;
    ctx.fillRect(x+TILE-6, y, 6, TILE);
    ctx.fillRect(x, y+TILE-6, TILE, 6);
    ctx.strokeStyle = t.wallDK;
    ctx.lineWidth = 1;
    ctx.strokeRect(x+0.5, y+0.5, TILE-1, TILE-1);
  }
}

function drawRockTile(x, y) {
  // Stone boulder - grey-brown, can't be destroyed
  ctx.fillStyle = C.rock;
  ctx.fillRect(x+3, y+5, TILE-6, TILE-8);
  ctx.fillStyle = C.rockHL;
  ctx.fillRect(x+5, y+7, TILE-18, 9);
  ctx.fillRect(x+7, y+7, 7, 16);
  ctx.fillStyle = C.rockDK;
  ctx.fillRect(x+TILE-9, y+TILE-11, 6, 7);
  ctx.fillRect(x+3, y+TILE-9, TILE-6, 5);
  // Crack
  ctx.strokeStyle = C.rockDK;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x+15, y+9); ctx.lineTo(x+20, y+18); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x+TILE-15, y+13); ctx.lineTo(x+TILE-10, y+24); ctx.stroke();
  ctx.strokeStyle = '#443322';
  ctx.lineWidth = 2;
  ctx.strokeRect(x+3, y+5, TILE-6, TILE-8);
}

function drawSoftBoxTile(x, y) {
  const t = th();
  if (currentPhase === 2) {
    // Wooden crate
    ctx.fillStyle = '#8b5e2a';
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = '#a07040';
    ctx.fillRect(x+3, y+3, TILE-6, 9);
    ctx.fillRect(x+3, y+TILE-12, TILE-6, 9);
    ctx.fillRect(x+3, y+3, 9, TILE-6);
    ctx.fillRect(x+TILE-12, y+3, 9, TILE-6);
    ctx.fillStyle = '#6b4a1a';
    ctx.fillRect(x+TILE/2-2, y+5, 4, TILE-10);
    ctx.fillRect(x+5, y+TILE/2-2, TILE-10, 4);
    ctx.fillStyle = '#4a2a08';
    ctx.fillRect(x, y, TILE, 3); ctx.fillRect(x, y, 3, TILE);
    ctx.fillRect(x+TILE-3, y, 3, TILE); ctx.fillRect(x, y+TILE-3, TILE, 3);
  } else {
    // Question brick
    ctx.fillStyle = t.softBox;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = t.softBoxDK;
    ctx.fillRect(x, y, TILE, 4); ctx.fillRect(x, y, 4, TILE);
    ctx.fillRect(x+TILE-4, y, 4, TILE); ctx.fillRect(x, y+TILE-4, TILE, 4);
    ctx.fillStyle = '#1a1060';
    ctx.font = `bold ${TILE*0.55}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', x+TILE/2, y+TILE/2+2);
  }
}

function drawPathTile(x, y, r, c) {
  const t = th();
  ctx.fillStyle = t.path;
  ctx.fillRect(x, y, TILE, TILE);
  if (currentPhase === 2) {
    // Steel floor plates with seams
    ctx.fillStyle = 'rgba(255,220,160,0.06)';
    ctx.fillRect(x+2, y+2, TILE-4, TILE-4);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+0.5, y+0.5, TILE-1, TILE-1);
  } else {
    // Grass dots
    ctx.fillStyle = t.pathDot;
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(x+8+((r*7+c*13+i*17)%26), y+8+((r*11+c*7+i*23)%26), 3, 3);
    }
  }
}

function drawExitTile(x, y) {
  const t = th();
  ctx.fillStyle = currentPhase === 2 ? '#150d30' : t.path;
  ctx.fillRect(x, y, TILE, TILE);
  const grd = ctx.createRadialGradient(x+TILE/2, y+TILE/2, 2, x+TILE/2, y+TILE/2, TILE/2);
  grd.addColorStop(0, 'rgba(255,208,0,0.9)');
  grd.addColorStop(1, 'rgba(255,128,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(x, y, TILE, TILE);
  const bob = Math.sin(Date.now()/300) * 3;
  ctx.font = `${TILE*0.65}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(currentPhase === 2 ? '🏆' : '⭐', x+TILE/2, y+TILE/2+bob);
}

function drawTile(r, c) {
  const x = c * TILE, y = r * TILE;
  const t = map[r][c];
  if (t === 'W') drawWallTile(x, y);
  else if (t === 'B') drawSoftBoxTile(x, y);
  else if (t === 'R') drawRockTile(x, y);
  else if (t === 'E') drawExitTile(x, y);
  else drawPathTile(x, y, r, c);
}

function drawPlayer() {
  if (!player || !player.alive) return;
  const cx = player.c * TILE + TILE / 2;
  const by = player.r * TILE + TILE;      // bottom of tile
  const dh = TILE * 2;                    // draw height: 2 tiles tall
  const dw = dh * 0.52;                   // proportional width
  const dx = cx - dw / 2;
  const dy = by - dh;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.ellipse(cx, by - 2, dw * 0.45, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  if (yuriSprite) {
    ctx.save();
    if ((player.facing || 1) < 0) {
      ctx.translate(cx * 2, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(yuriSprite, dx, dy, dw, dh);
    ctx.restore();
  } else {
    // Fallback while image loads
    ctx.fillStyle = C.player;
    ctx.beginPath();
    ctx.arc(cx, player.r * TILE + TILE / 2, TILE * 0.38, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawEnemy(e) {
  if (!e.alive) return;
  const x = e.c * TILE + TILE/2;
  const y = e.r * TILE + TILE/2;
  const t = th();

  if (e.type === 'gorilla') {
    const s = TILE * 0.38;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(x, y+s+4, s*0.8, s*0.26, 0, 0, Math.PI*2); ctx.fill();
    // Body
    ctx.fillStyle = C.gorilla;
    ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = C.gorillaHL;
    ctx.beginPath(); ctx.arc(x-s*0.2, y-s*0.25, s*0.32, 0, Math.PI*2); ctx.fill();
    // Face plate
    ctx.fillStyle = '#cc9966';
    ctx.fillRect(x-s*0.5, y-s*0.18, s*1.0, s*0.65);
    // Angry eyes
    ctx.fillStyle = 'red';
    ctx.fillRect(x-s*0.44, y-s*0.14, s*0.3, s*0.24);
    ctx.fillRect(x+s*0.12, y-s*0.14, s*0.3, s*0.24);
    ctx.fillStyle = '#000';
    ctx.fillRect(x-s*0.36, y-s*0.1, s*0.14, s*0.14);
    ctx.fillRect(x+s*0.2, y-s*0.1, s*0.14, s*0.14);
    // Angry brows
    ctx.fillStyle = '#221100';
    ctx.fillRect(x-s*0.48, y-s*0.3, s*0.36, s*0.1);
    ctx.fillRect(x+s*0.1, y-s*0.28, s*0.36, s*0.1);
    // Teeth
    ctx.fillStyle = 'white';
    ctx.fillRect(x-s*0.26, y+s*0.24, s*0.2, s*0.22);
    ctx.fillRect(x+s*0.06, y+s*0.24, s*0.2, s*0.22);
    // Arms
    ctx.fillStyle = C.gorilla;
    ctx.fillRect(x-s*1.1, y-s*0.12, s*0.55, s*0.38);
    ctx.fillRect(x+s*0.55, y-s*0.12, s*0.55, s*0.38);
    ctx.fillStyle = C.gorillaHL;
    ctx.beginPath(); ctx.arc(x-s*0.9, y+s*0.26, s*0.24, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+s*0.9, y+s*0.26, s*0.24, 0, Math.PI*2); ctx.fill();
    // Feet
    ctx.fillStyle = '#221100';
    ctx.fillRect(x-s*0.5, y+s*0.72, s*0.42, s*0.35);
    ctx.fillRect(x+s*0.1, y+s*0.72, s*0.42, s*0.35);
  } else {
    const s = TILE * 0.4;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(x, y+s+2, s*0.75, s*0.24, 0, 0, Math.PI*2); ctx.fill();
    // Body
    ctx.fillStyle = t.enemy;
    ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = t.enemyHL;
    ctx.beginPath(); ctx.arc(x-s*0.22, y-s*0.3, s*0.3, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = 'white';
    ctx.fillRect(x-s*0.4, y-s*0.22, s*0.28, s*0.28);
    ctx.fillRect(x+s*0.12, y-s*0.22, s*0.28, s*0.28);
    ctx.fillStyle = 'red';
    ctx.fillRect(x-s*0.32, y-s*0.16, s*0.15, s*0.15);
    ctx.fillRect(x+s*0.18, y-s*0.16, s*0.15, s*0.15);
    // Angry mouth
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y+s*0.12, s*0.3, 0.1, Math.PI-0.1); ctx.stroke();
    // Walking feet animation
    const bob = Math.sin(Date.now()/180 + e.r*3 + e.c) > 0;
    ctx.fillStyle = '#1a1060';
    ctx.fillRect(x+(bob?-s*0.5:-s*0.4), y+s*0.7, s*0.4, s*0.35);
    ctx.fillRect(x+(bob?s*0.1:s*0.0), y+s*0.7, s*0.4, s*0.35);
  }
}

function drawBomb(b) {
  const x = b.c * TILE + TILE/2;
  const y = b.r * TILE + TILE/2;
  const s = TILE * 0.35;
  const pulse = 0.9 + 0.1*Math.sin(Date.now()/100);
  const pct = b.timer / b.maxTimer;
  // Danger glow when close to exploding
  if (pct < 0.4) {
    ctx.fillStyle = `rgba(255,50,0,${(1-pct*2.5)*0.25})`;
    ctx.beginPath(); ctx.arc(x, y+4, s*2.8, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = C.bomb;
  ctx.beginPath(); ctx.arc(x, y+4, s*pulse, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = C.bombHL;
  ctx.beginPath(); ctx.arc(x-s*0.25, y-s*0.25+4, s*0.35, 0, Math.PI*2); ctx.fill();
  // Fuse
  ctx.strokeStyle = '#885500';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x+s*0.3, y-s*0.5+4);
  ctx.quadraticCurveTo(x+s*0.7, y-s, x+s*0.4, y-s*1.3+4);
  ctx.stroke();
  // Spark
  ctx.fillStyle = pct > 0.5 ? '#ffcc00' : '#ff4400';
  ctx.beginPath(); ctx.arc(x+s*0.4, y-s*1.3+4, 4*pulse, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(x+s*0.4, y-s*1.3+4, 2*pulse, 0, Math.PI*2); ctx.fill();
  // Timer arc
  ctx.strokeStyle = pct > 0.5 ? '#ffcc00' : '#ff2200';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x, y+4, s+6, -Math.PI/2, -Math.PI/2 + (1-pct)*Math.PI*2);
  ctx.stroke();
}

function drawExplosion(ex) {
  const alpha = ex.life / ex.maxLife;
  ex.tiles.forEach(([r,c]) => {
    const x = c*TILE, y = r*TILE;
    const grd = ctx.createRadialGradient(x+TILE/2, y+TILE/2, 0, x+TILE/2, y+TILE/2, TILE*0.8);
    grd.addColorStop(0, `rgba(255,255,160,${alpha})`);
    grd.addColorStop(0.3, `rgba(255,160,0,${alpha*0.95})`);
    grd.addColorStop(0.7, `rgba(255,60,0,${alpha*0.6})`);
    grd.addColorStop(1, `rgba(255,50,0,0)`);
    ctx.fillStyle = grd;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = `rgba(255,230,60,${alpha*0.7})`;
    const m = TILE*0.18;
    ctx.fillRect(x+m, y, TILE-m*2, TILE);
    ctx.fillRect(x, y+m, TILE, TILE-m*2);
  });
}

function drawScorePopups() {
  scorePopups.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color || '#ffd000';
    ctx.font = `bold 13px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.text, p.x, p.y);
  });
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      drawTile(r, c);
  explosions.forEach(drawExplosion);
  bombs.forEach(drawBomb);
  enemies.forEach(drawEnemy);
  drawPlayer();
  drawScorePopups();
}

// ===== GAMEPLAY =====
function canMove(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
  const t = map[r][c];
  if (t === 'W' || t === 'B' || t === 'R') return false;
  if (bombs.some(b => b.r === r && b.c === c)) return false;
  return true;
}

function placeBomb() {
  if (!player || !player.alive) return;
  if (bombTimer < bombCooldown) return;
  if (bombs.some(b => b.r === player.r && b.c === player.c)) return;
  bombTimer = 0;
  bombs.push({ r: player.r, c: player.c, timer: 2200, maxTimer: 2200 });
}

function explodeBomb(b) {
  const tiles = [[b.r, b.c, 'center']];
  [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dr,dc]) => {
    for (let i = 1; i <= 2; i++) {
      const nr = b.r+dr*i, nc = b.c+dc*i;
      if (nr < 0||nr >= ROWS||nc < 0||nc >= COLS) break;
      if (map[nr][nc] === 'W' || map[nr][nc] === 'R') break;
      tiles.push([nr, nc, 'arm']);
      if (map[nr][nc] === 'B') { map[nr][nc] = '.'; score += 10; break; }
    }
  });
  explosions.push({ tiles, life: 700, maxLife: 700 });
  if (player && player.alive)
    tiles.forEach(([r,c]) => { if (r===player.r && c===player.c) killPlayer(); });
  enemies.forEach(e => {
    if (!e.alive) return;
    tiles.forEach(([r,c]) => {
      if (r===e.r && c===e.c) {
        e.alive = false;
        const pts = e.type === 'gorilla' ? 250 : 100;
        score += pts;
        scorePopups.push({ x: e.c*TILE+TILE/2, y: e.r*TILE+TILE/4, text: '+'+pts,
          life: 900, maxLife: 900, color: e.type==='gorilla' ? '#ff8844' : '#ffd000' });
        updateHUD();
      }
    });
  });
}

function killPlayer() {
  if (!player || !player.alive) return;
  player.alive = false;
  lives--;
  updateHUD();
  if (lives <= 0) {
    setTimeout(() => showOverlay('lose'), 700);
  } else {
    setTimeout(() => {
      const tmpl = MAPS[currentPhase - 1];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (tmpl[r][c] === 'S') { player = { r, c, alive: true, facing: 1 }; return; }
        }
      }
    }, 700);
  }
}

function showOverlay(type) {
  const ov = document.getElementById('overlay');
  const title = document.getElementById('overlay-title');
  const msg = document.getElementById('overlay-msg');
  const btn = document.getElementById('overlay-btn');
  ov.classList.add('show');
  if (type === 'phase2') {
    title.textContent = '⚡  PHASE 2!';
    title.style.color = '#ff8800';
    msg.textContent = 'THE GORILLAS ARE COMING!\nROCKS BLOCK YOUR PATH!';
    btn.textContent = 'ENTER PHASE 2';
    btn.onclick = () => { ov.classList.remove('show'); startPhase2(); };
  } else if (type === 'win') {
    title.textContent = '🏆  YOU WIN!';
    title.style.color = '#ffd000';
    msg.textContent = 'AMAZING YURI!\nFINAL SCORE: ' + score;
    btn.textContent = 'PLAY AGAIN';
    btn.onclick = restartGame;
  } else {
    title.textContent = '💥  GAME OVER';
    title.style.color = '#ff3020';
    msg.textContent = 'SCORE: ' + score + '\nTRY AGAIN!';
    btn.textContent = 'PLAY AGAIN';
    btn.onclick = restartGame;
  }
}

function startPhase2() {
  lives = 3;
  initGame(2);
  lastTime = performance.now();
  requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
}

function moveEnemies(dt) {
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  enemies.forEach(e => {
    if (!e.alive) return;
    e.moveTimer += dt;
    if (e.moveTimer < e.moveSpeed) return;
    e.moveTimer = 0;
    // Try to move toward player or random
    let choices = dirs.filter(([dr,dc]) => canMove(e.r+dr, e.c+dc));
    if (choices.length === 0) return;
    const chaseProb = e.type === 'gorilla' ? 0.75 : 0.45;
    if (player && player.alive && Math.random() < chaseProb) {
      choices.sort((a,b) => {
        const da = Math.abs((e.r+a[0])-player.r)+Math.abs((e.c+a[1])-player.c);
        const db = Math.abs((e.r+b[0])-player.r)+Math.abs((e.c+b[1])-player.c);
        return da - db;
      });
    } else {
      choices = [choices[Math.floor(Math.random()*choices.length)]];
    }
    const [dr,dc] = choices[0];
    e.r += dr; e.c += dc;
    // Check collision with player
    if (player && player.alive && e.r===player.r && e.c===player.c) killPlayer();
  });
}

// Key state
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); placeBomb(); }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function handlePlayerMove(dt) {
  if (!player || !player.alive) return;
  // On touch devices, movement is handled by mobileMove() directly
  if (window.matchMedia('(pointer: coarse)').matches) return;
  playerMoveTimer += dt;
  if (playerMoveTimer < PLAYER_SPEED) return;
  let dr = 0, dc = 0;
  if (keys['ArrowUp'] || keys['KeyW']) dr = -1;
  else if (keys['ArrowDown'] || keys['KeyS']) dr = 1;
  else if (keys['ArrowLeft'] || keys['KeyA']) { dc = -1; player.facing = -1; }
  else if (keys['ArrowRight'] || keys['KeyD']) { dc = 1; player.facing = 1; }
  else return;
  playerMoveTimer = 0;
  const nr = player.r + dr, nc = player.c + dc;
  if (canMove(nr, nc)) {
    player.r = nr; player.c = nc;
    if (map[nr][nc] === 'E') {
      won = true;
      if (currentPhase === 1) setTimeout(() => showOverlay('phase2'), 400);
      else setTimeout(() => showOverlay('win'), 400);
    }
    enemies.forEach(e => { if (e.alive && e.r===nr && e.c===nc) killPlayer(); });
  }
}

// ===== GAME LOOP =====
function gameLoop(ts) {
  if (gameOver || won) return;
  const dt = Math.min(ts - lastTime, 100);
  lastTime = ts;

  // Bomb timer
  if (bombTimer < bombCooldown) bombTimer = Math.min(bombCooldown, bombTimer + dt);

  // Update bombs
  bombs.forEach(b => { b.timer -= dt; if (b.timer <= 0) b.explode = true; });
  bombs.filter(b => b.explode).forEach(b => explodeBomb(b));
  bombs = bombs.filter(b => !b.explode);

  explosions.forEach(ex => ex.life -= dt);
  explosions = explosions.filter(ex => ex.life > 0);

  scorePopups.forEach(p => { p.life -= dt; p.y -= 0.5; });
  scorePopups = scorePopups.filter(p => p.life > 0);

  moveEnemies(dt);
  handlePlayerMove(dt);

  updateHUD();
  draw();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  lives = 3;
  resizeCanvas();
  initGame(1);
  lastTime = performance.now();
  requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
}

function restartGame() {
  document.getElementById('overlay').classList.remove('show');
  lives = 3;
  initGame(1);
  lastTime = performance.now();
  requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
}

// Title screen click/keypress
document.getElementById('title-screen').addEventListener('click', startGame);
document.addEventListener('keydown', e => {
  if (e.code === 'Enter' || e.code === 'Space') {
    if (document.getElementById('title-screen').style.display !== 'none') {
      e.preventDefault(); startGame();
    }
  }
});

// Mobile: tap-to-move one tile at a time (no held keys  avoids gravity drift)
let lastMobileTap = 0;
const MOBILE_TAP_THROTTLE = 160; // ms between taps

function mobileMove(dr, dc) {
  if (!player || !player.alive) return;
  const now = Date.now();
  if (now - lastMobileTap < MOBILE_TAP_THROTTLE) return;
  lastMobileTap = now;
  if (dc !== 0) player.facing = dc > 0 ? 1 : -1;
  const nr = player.r + dr, nc = player.c + dc;
  if (canMove(nr, nc)) {
    player.r = nr; player.c = nc;
    playerMoveTimer = 0;
    if (map[nr][nc] === 'E') {
      won = true;
      if (currentPhase === 1) setTimeout(() => showOverlay('phase2'), 400);
      else setTimeout(() => showOverlay('win'), 400);
    }
    enemies.forEach(e => { if (e.alive && e.r===nr && e.c===nc) killPlayer(); });
  }
}

function mobileTapBtn(id, dr, dc) {
  const el = document.getElementById(id);
  if (!el) return;
  // touchstart fires immediately  one move per tap, no hold
  el.addEventListener('touchstart', e => { e.preventDefault(); mobileMove(dr, dc); }, { passive: false });
  el.addEventListener('mousedown', e => { e.preventDefault(); mobileMove(dr, dc); });
}

mobileTapBtn('btn-up',    -1,  0);
mobileTapBtn('btn-down',   1,  0);
mobileTapBtn('btn-left',   0, -1);
mobileTapBtn('btn-right',  0,  1);

// Also support holding for repeated movement
let holdInterval = null;
function startHold(dr, dc) {
  mobileMove(dr, dc);
  holdInterval = setInterval(() => mobileMove(dr, dc), 200);
}
function stopHold() { clearInterval(holdInterval); holdInterval = null; }

['btn-up','btn-down','btn-left','btn-right'].forEach((id, i) => {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchend',   e => { e.preventDefault(); stopHold(); }, { passive: false });
  el.addEventListener('touchcancel',e => { e.preventDefault(); stopHold(); }, { passive: false });
  el.addEventListener('mouseup',    stopHold);
  el.addEventListener('mouseleave', stopHold);
});

document.getElementById('bomb-btn').addEventListener('touchstart', e => { e.preventDefault(); placeBomb(); }, { passive: false });
document.getElementById('bomb-btn').addEventListener('click', placeBomb);

window.addEventListener('resize', () => { if (document.getElementById('game-screen').style.display !== 'none') resizeCanvas(); });
</script>
